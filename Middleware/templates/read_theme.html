<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Settings</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fce4ec; /* Light pink background */
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-pink {
            background-color: #e91e63;
            color: white;
            border-radius: 20px;
        }
        .btn-pink:hover {
            background-color: #c2185b;
            color: white;
        }
        .text-pink {
            color: #d81b60;
        }
        .border-pink {
            border: 1px solid #f8bbd0;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-5">
                    <h1 class="text-pink mb-4">Theme Cookie Settings</h1>
                    
                    <div class="alert alert-light border-pink mb-4">
                        <p class="mb-0 text-muted">Current Theme Cookie Value:</p>
                        <h3 class="text-pink"><strong>{% if theme_value %}{{ theme_value }}{% else %}Not Set{% endif %}</strong></h3>
                    </div>

                    <div class="d-grid gap-3">
                        <a href="{% url 'set_theme_cookie' %}" class="btn btn-pink btn-lg py-2">Set "Dark" Theme Cookie</a>
                    </div>
                    
                    <div class="mt-4">
                        <a href="{% url 'home' %}" class="text-pink text-decoration-none">&larr; Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
