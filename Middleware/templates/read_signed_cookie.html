<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Cookie Settings</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fce4ec; /* Light pink background */
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-pink {
            background-color: #e91e63;
            color: white;
            border-radius: 20px;
        }
        .btn-pink:hover {
            background-color: #c2185b;
            color: white;
        }
        .text-pink {
            color: #d81b60;
        }
        .border-pink {
            border: 1px solid #f8bbd0;
        }
        .badge-signed {
            background-color: #f06292;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="card p-5">
                    <h1 class="text-pink mb-4">Signed Cookie Reader</h1>
                    
                    <div class="alert alert-light border-pink mb-4 text-start">
                        <p class="mb-2 text-muted">Signature Status:</p>
                        {% if signature_valid %}
                            <span class="badge rounded-pill bg-success mb-3">Valid Signature</span>
                        {% else %}
                            <span class="badge rounded-pill bg-danger mb-3">Invalid or Missing Signature</span>
                        {% endif %}
                        
                        <p class="mb-0 text-muted">Verified Content:</p>
                        <h4 class="text-pink"><strong>{{ verified_value }}</strong></h4>
                    </div>

                    <div class="d-grid gap-3">
                        <a href="{% url 'set_signed_cookie' %}" class="btn btn-pink btn-lg py-2">Set Signed Role Cookie</a>
                    </div>
                    
                    <div class="mt-4">
                        <a href="{% url 'home' %}" class="text-pink text-decoration-none">&larr; Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
