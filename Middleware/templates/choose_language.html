<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Language</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fce4ec; /* Light pink background */
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }
        .btn-pink {
            background-color: #e91e63;
            color: white;
            border-radius: 20px;
        }
        .btn-pink:hover {
            background-color: #c2185b;
            color: white;
        }
        .text-pink {
            color: #d81b60;
        }
        .form-select:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 0.25rem rgba(233, 30, 99, 0.25);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-5">
                    <h1 class="text-pink mb-4">Choose Your Language</h1>
                    <p class="lead mb-4">Current Language: <strong>{{ current_language|upper }}</strong></p>
                    
                    <form method="post" class="mt-3">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="language" class="form-label">Select Language:</label>
                            <select name="language" id="language" class="form-select text-center border-pink">
                                {% for code, name in supported_languages.items %}
                                    <option value="{{ code }}" {% if code == current_language %}selected{% endif %}>{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-pink btn-lg py-2">Save Settings</button>
                        </div>
                    </form>
                    
                    <div class="mt-4">
                        <a href="{% url 'home' %}" class="text-pink text-decoration-none">&larr; Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
